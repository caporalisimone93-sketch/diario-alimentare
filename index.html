<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Il Mio Dietologo</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; padding: 20px; background-color: #f4f4f9; }
        .menu { display: flex; gap: 10px; margin-bottom: 15px; }
        .menu button { background-color: #007bff; flex: 1; padding: 10px; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .menu button:hover { background-color: #0056b3; }
        
        /* CHAT AREA */
        #chat-box { background: white; padding: 15px; border-radius: 10px; height: 400px; overflow-y: auto; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .input-area { display: flex; gap: 10px; margin-bottom: 10px; }
        input, select { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .btn-invia { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        
        /* CONFIG AREA SOTTO CHAT */
        .config-area { background: #eee; padding: 12px; border-radius: 8px; margin-top: 15px; font-size: 0.85em; }
        .config-area h3 { margin: 0 0 8px 0; font-size: 0.9em; color: #555; }
        .config-input-group { display: flex; gap: 5px; }
        .config-input-group input { padding: 6px; font-size: 0.8em; }
        .btn-save-api { background: #6c757d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }

        /* DASHBOARD AREA */
        #dashboard-box { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: none; }
        .titolo-filtri { font-size: 0.9em; color: #555; margin-bottom: 5px; margin-top: 15px; font-weight: bold; }
        .filtri-tempo { display: flex; flex-wrap: wrap; gap: 5px; }
        .filtri-tempo button { flex: 1; padding: 6px; font-size: 0.8em; background-color: #6c757d; color: white; border: none; border-radius: 3px; cursor: pointer; }
        .profilo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .select-full { width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 1em; box-sizing: border-box; }
        
        .container-reset { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .btn-reset { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 0.75em; font-weight: bold; }

        hr { border: 0; border-top: 1px solid #eee; margin: 25px 0; }
    </style>
</head>
<body>

    <h2>🍏 Il Mio Dietologo</h2>

    <div class="menu">
        <button onclick="mostraChat()">💬 Chat</button>
        <button onclick="mostraDashboard()">📊 Dashboard</button>
    </div>
    
    <div id="chat-section">
        <div id="chat-box">
            <p><strong>Dietologo:</strong> Ciao! Cosa hai mangiato o fatto oggi?</p>
        </div>
        <div class="input-area" id="input-area">
            <input type="text" id="user-input" placeholder="Scrivi qui...">
            <button class="btn-invia" onclick="inviaMessaggio()">Invia</button>
        </div>

        <div class="config-area">
            <h3>⚙️ Configurazione API Gemini</h3>
            <div class="config-input-group">
                <input type="password" id="api-key-input" placeholder="Incolla API Key qui...">
                <button class="btn-save-api" onclick="salvaApiKey()">Salva</button>
            </div>
            <p style="margin: 5px 0 0 0; font-size: 0.8em; color: #777;">
                Chiave salvata solo sul tuo iPhone. <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color: #007bff;">Prendi chiave gratis</a>
            </p>
        </div>
    </div>

    <div id="dashboard-box">
        <h3 style="margin-top: 0;">Analisi Nutrizionale</h3>
        <div class="titolo-filtri">Intervallo:</div>
        <div class="filtri-tempo">
            <button onclick="cambiaFiltro('oggi')">Oggi</button>
            <button onclick="cambiaFiltro('settimana')">Settimana</button>
            <button onclick="cambiaFiltro('mese')">Mese</button>
        </div>

        <div class="titolo-filtri">Metriche Dietetiche:</div>
        <div class="filtri-tempo filtri-dati">
            <button onclick="cambiaMetrica('base')">Base</button>
            <button onclick="cambiaMetrica('deficit')">Deficit</button>
            <button onclick="cambiaMetrica('proteine')">Proteine</button>
            <button onclick="cambiaMetrica('carboidrati')">Carbo</button>
            <button onclick="cambiaMetrica('grassi')">Grassi</button>
        </div>
        <canvas id="graficoCalorie" style="margin-top: 15px;"></canvas>

        <hr>

        <h3>Profilo Fisico</h3>
        <div class="profilo-grid">
            <input type="number" id="input-peso" placeholder="Peso (kg)" step="0.1">
            <input type="number" id="input-altezza" placeholder="Altezza (cm)">
            <input type="number" id="input-eta" placeholder="Età">
            <select id="input-sesso">
                <option value="M">Uomo</option>
                <option value="F">Donna</option>
            </select>
        </div>
        <select id="input-attivita" class="select-full">
            <option value="1.2">Sedentario (poco o nessun esercizio)</option>
            <option value="1.375">Leggermente attivo (1-3 gg/settimana)</option>
            <option value="1.55" selected>Moderatamente attivo (3-5 gg)</option>
            <option value="1.725">Molto attivo (6-7 gg)</option>
            <option value="1.9">Estremamente attivo (lavoro fisico)</option>
        </select>
        <button class="btn-invia" style="width: 100%;" onclick="salvaProfilo()">Aggiorna Dati Fisici</button>
        <p id="risultato-profilo" style="font-size: 0.85em; color: #333; text-align: center; margin-top: 10px;"></p>

        <hr>

        <h3>Andamento Fisico</h3>
        <div class="filtri-tempo filtri-dati" style="margin-bottom: 10px;">
            <button onclick="cambiaMetricaFisica('peso')" style="background-color: #e83e8c;">Peso</button>
            <button onclick="cambiaMetricaFisica('bmi')" style="background-color: #6f42c1;">BMI</button>
        </div>
        <canvas id="graficoFisico"></canvas>

        <div class="container-reset">
            <button class="btn-reset" onclick="resetDatiGiorno(1)">🗑️ Reset Ieri</button>
            <button class="btn-reset" onclick="resetDatiGiorno(0)">🗑️ Reset Oggi</button>
        </div>
    </div>

    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
